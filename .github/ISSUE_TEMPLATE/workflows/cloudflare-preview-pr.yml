name: Cloudflare Preview PR Check

on:
  pull_request:
    branches:
      - staging
      - demo
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: cf-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview-check:
    if: github.event.pull_request.head.ref == 'dev'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy preview to Cloudflare Pages
        id: deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT: ${{ secrets.CLOUDFLARE_PAGES_PROJECT }}
        run: |
          npx wrangler pages deploy ./dist \
            --project-name="${CLOUDFLARE_PAGES_PROJECT}" \
            --branch="${{ github.head_ref }}" | tee deploy.log
          echo "preview_url=$(grep -Eo 'https://[^ ]+pages.dev' deploy.log | tail -n 1)" >> $GITHUB_OUTPUT

      - name: Upload deploy log
        uses: actions/upload-artifact@v4
        with:
          name: cloudflare-preview-deploy-log
          path: deploy.log

      - name: Comment preview link on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = `${{ steps.deploy.outputs.preview_url }}`;
            const body = [
              '## Cloudflare Preview Ready',
              '',
              `- Preview: ${previewUrl || 'Not found in deploy output'}`,
              '- Branch: dev',
              '- Target: ' + context.payload.pull_request.base.ref,
              '- Build log artifact: cloudflare-preview-deploy-log'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });